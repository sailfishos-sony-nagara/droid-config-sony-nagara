# Use POSIX /bin/sh syntax only. The wrapper sources /etc/lpac/*.conf with
# automatic export enabled, so assignments made here become environment
# variables for lpac.
#
# Each setting below is only applied when it was not already defined by the
# caller environment. This lets commands like `LPAC_APDU=pcsc lpac ...`
# override this file.

if [ "${LPAC_APDU+x}" != x ]; then
    LPAC_APDU=gbinder
fi
